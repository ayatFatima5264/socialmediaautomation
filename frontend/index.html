<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0E7A5A" />

    <!-- Pinterest domain verification -->
    <meta name="p:domain_verify" content="802666ae2016634960271fe49274ca91" />

    <!-- Primary SEO (per-page tags are managed at runtime by <Seo />) -->
    <title>AutoSocial AI — AI Social Media Studio</title>
    <meta
      name="description"
      content="AutoSocial AI generates, schedules, and publishes on-brand social media content across every platform — captions, images, and carousels, powered by AI."
    />

    <!-- Open Graph defaults -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AutoSocial AI" />
    <meta property="og:title" content="AutoSocial AI — AI Social Media Studio" />
    <meta
      property="og:description"
      content="Generate, schedule, and publish on-brand social content with AI — across every platform, from one studio."
    />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter defaults -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AutoSocial AI — AI Social Media Studio" />
    <meta
      name="twitter:description"
      content="Generate, schedule, and publish on-brand social content with AI — across every platform, from one studio."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Boot loader styles — shown until React mounts, then replaced. -->
    <style>
      #app-boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #020617;
        color: #94a3b8;
        font-family: 'Inter', system-ui, sans-serif;
      }
      html:not(.dark) #app-boot {
        background: #f1f5f9;
        color: #64748b;
      }
      #app-boot .boot-mark {
        width: 56px;
        height: 56px;
        display: grid;
        place-items: center;
        animation: boot-pulse 1.2s ease-in-out infinite;
      }
      #app-boot .boot-mark svg {
        width: 100%;
        height: 100%;
      }
      #app-boot .boot-row {
        margin-top: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
      }
      #app-boot .boot-spin {
        width: 16px;
        height: 16px;
        border-radius: 9999px;
        border: 2px solid rgba(99, 102, 241, 0.3);
        border-top-color: #6366f1;
        animation: boot-spin 0.8s linear infinite;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes boot-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Replaced by React on mount; prevents a blank white flash on refresh. -->
      <div id="app-boot">
        <div style="text-align: center">
          <div class="boot-mark">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AutoSocial AI">
              <rect width="200" height="200" rx="46" fill="#0E7A5A" />
              <g transform="translate(-10 -5)">
                <line x1="110" y1="60" x2="64" y2="150" stroke="#EAFBF3" stroke-width="8" stroke-linecap="round" />
                <line x1="110" y1="60" x2="156" y2="150" stroke="#EAFBF3" stroke-width="8" stroke-linecap="round" />
                <line x1="64" y1="150" x2="156" y2="150" stroke="#EAFBF3" stroke-width="8" stroke-linecap="round" />
                <circle cx="110" cy="60" r="18" fill="#6EE7B7" />
                <circle cx="64" cy="150" r="16" fill="#EAFBF3" />
                <circle cx="156" cy="150" r="16" fill="#EAFBF3" />
              </g>
            </svg>
          </div>
          <div class="boot-row">
            <span class="boot-spin"></span>
            Loading AutoSocial AI…
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
